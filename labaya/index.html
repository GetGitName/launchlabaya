<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Labaya Studio</title>

  <link rel="icon" href="assets/lbstudio.png" type="image/png" sizes="any">
  <link rel="stylesheet" href="styles.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
</head>

<body>

  <!-- SECTION 1 -->
  <section class="hero">

    <div class="hero-content reveal">

      <img src="assets/labayastudio.png" alt="Labaya Studio" class="logo"/>

      <p class="subtitle">
        CREATIVE MARKETING STUDIO
      </p>

      <p class="subtitle">
        •The fruit of our passion•
Great brands are more that famous names. They're ideas worth rallying around.
      </p>

      <h1>COMING<br>SOON!</h1>

      <div class="line"></div>

      <p class="description">
        Strategy-led marketing studio driving brand direction, hight-impact execution & performance. 
      </p>

      <p class="email description">
        hello@labaya.studio
      </p>  

      <p class="copyright">
        © 2026 LABAYA STUDIO
      </p>

    </div>

  </section>

  <!-- SECTION 2 -->
  <section class="contact-section">

    <div class="contact-container fade-left">

      <h2>Contacto</h2>

      <form id="contactForm">

        <div class="form-group">
          <label>Name:*</label>
          <input
            type="text"
            name="name"
            placeholder="Your name"
            required
          />
        </div>

        <div class="form-group">
          <label>Work Email:*</label>
          <input
            type="email"
            name="email"
            placeholder="example@domain.com"
            required
          />
        </div>

        <div class="form-group">
          <label>Company</label>
          <input
            type="text"
            name="website"
            placeholder="Company name"
          />
        </div>

        <div class="form-group">
          <label>Message</label>
          <textarea
            name="message"
            rows="5"
            placeholder="Write your message..."
          ></textarea>
        </div>

        <button type="submit">
          Send Message
        </button>

        <p id="responseMessage"></p>

      </form>

    </div>

  </section>

  <script src="script.js"></script>

</body>
</html>
