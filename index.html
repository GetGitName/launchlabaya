<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Labaya Studio — Coming Soon</title>

  <style>
    :root{
      --bg:#f4f4f4;
      --text:#000000;
      --muted:#555555;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:var(--bg);
      color:var(--text);
      font-family: Inter, Helvetica, Arial, sans-serif;
      min-height:100vh;
      overflow-x:hidden;
      overflow-y:auto;
      position:relative;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:40px 0;
    }

    .noise{
      position:absolute;
      inset:0;
      opacity:.03;
      pointer-events:none;
      background-image:
      radial-gradient(circle at 25% 25%, #000 1px, transparent 0),
      radial-gradient(circle at 75% 75%, #000 1px, transparent 0);
      background-size:40px 40px;
    }

    .berry{
      position:absolute;
      width:420px;
      opacity:.05;
      animation:float 10s ease-in-out infinite;
      z-index:0;
    }

    .berry.left{
      left:-10px;
      bottom:0px;
      transform:rotate(-10deg);
    }

    .berry.right{
      right:-140px;
      top:-100px;
      transform:rotate(18deg) scale(.85);
      animation-delay:2s;
    }

    @keyframes float{
      0%,100%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-20px);
      }
    }

    .container{
      position:relative;
      z-index:2;
      width:min(90%, 900px);
      text-align:center;
      padding:40px;
    }

    .logo{
      width:min(520px, 90%);
      margin-bottom:40px;
    }

    .tag{
      font-size:.9rem;
      letter-spacing:.35em;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:20px;
    }

    h1{
      font-size:clamp(3rem, 9vw, 7rem);
      line-height:.95;
      font-weight:900;
      margin-bottom:24px;
    }

    p{
      max-width:620px;
      margin:0 auto 40px auto;
      color:var(--muted);
      font-size:1.05rem;
      line-height:1.7;
    }

    .divider{
      width:80px;
      height:4px;
      background:#000;
      margin:0 auto 40px auto;
      border-radius:999px;
    }

    .form-card{
      background:#ffffff;
      border:1px solid rgba(0,0,0,.08);
      border-radius:26px;
      box-shadow:0 30px 60px rgba(0,0,0,.06);
      padding:32px;
      max-width:640px;
      margin:0 auto 40px auto;
      text-align:left;
    }

    .form-card h2{
      margin-bottom:24px;
      font-size:1.2rem;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .field{
      margin-bottom:18px;
    }

    .field label{
      display:block;
      font-size:.9rem;
      font-weight:700;
      margin-bottom:8px;
      color:#111;
    }

    .field input{
      width:100%;
      min-height:54px;
      padding:12px 16px;
      border:1px solid #dcdcdc;
      border-radius:16px;
      background:#f9f9f9;
      font-size:1rem;
      color:#111;
    }

    .field input:focus{
      outline:none;
      border-color:#000;
      background:#fff;
    }

    .form-submit{
      display:flex;
      justify-content:flex-end;
      margin-top:8px;
    }

    .form-submit button{
      border:none;
      background:#000;
      color:#fff;
      padding:16px 32px;
      border-radius:999px;
      font-size:1rem;
      letter-spacing:.08em;
      text-transform:uppercase;
      cursor:pointer;
      transition:transform .2s ease, background .2s ease;
    }

    .form-submit button:hover{
      background:#111;
      transform:translateY(-1px);
    }

    .launch-map-wrapper{
      margin:0 auto 40px auto;
      max-width:900px;
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 20px 40px rgba(0,0,0,.08);
    }

    .launch-map{
      display:block;
      width:100%;
      height:auto;
    }

    .launch-map-link{
      display:block;
      text-decoration:none;
    }

    .footer{
      font-size:.85rem;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:#777;
    }

    @media (max-width:768px){

      .berry{
        width:260px;
      }

      .container{
        padding:24px;
      }

      p{
        font-size:.95rem;
      }
    }
  </style>
</head>

<body>

  <div class="noise"></div>

  <!-- Fondo decorativo -->
  <img src="labayastudio.png" alt="Labaya Berry" class="berry left">
  <img src="labayastudio.png" alt="Labaya Berry" class="berry right">
  

  <main class="container">

    <!-- Logo principal -->
    <img src="labayastudio.png" alt="Labaya Studio" class="logo">

    <div class="tag">CREATIVE MARKETING STUDIO</div>

    <p>
      •The fruit of our passion•
Great brands are more that famous names. They're ideas worth rallying around.
    </p>    

    <h1>COMING<br>SOON!</h1>

    <div class="divider"></div>

    <p>
      Strategy-led marketing studio driving brand direction, hight-impact execution & performance. 
    </p>

    <article>hello@labaya.studio</article>

    <div class="footer">
      © 2026 LABAYA STUDIO
    </div>
    <p></p>
<section>
    <div class="form-card">
      <h2>Stay in touch</h2>
      <form action="mailto:hello@labaya.studio" method="post" enctype="text/plain">
        <div class="field">
          <label for="firstName">First Name*</label>
          <input id="firstName" name="First Name" type="text" placeholder="Your first name" required>
        </div>
        <div class="field">
          <label for="workEmail">Work Email*</label>
          <input id="workEmail" name="Work Email" type="email" placeholder="example@domain.com" required>
        </div>
        <div class="field">
          <label for="companyWebsite">Company Website</label>
          <input id="companyWebsite" name="Company Website" type="url" placeholder="https://www.website.com">
        </div>
        <div class="form-submit">
          <button type="submit">Send</button>
        </div>
      </form>
    </div>
  </section>

  <section>
    <a href="mapalanzamiento.png" target="_blank" rel="noopener" class="launch-map-link" aria-label="Ver mapa de lanzamiento en tamaño real">
      <div class="launch-map-wrapper">
        <img src="mapalanzamiento.png" alt="Mapa Lanzamiento" class="launch-map">
      </div>
    </a>
  </section>

  </main>

  

</body>
</html>
